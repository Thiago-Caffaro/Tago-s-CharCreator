services:
  backend:
    image: ghcr.io/thiago-caffaro/tago-s-charcreator/backend:latest
    expose:
      - "8000"
    volumes:
      - charcreator_data:/app/data
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/tagosCharCreator.db}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-anthropic/claude-sonnet-4-5}
      PREFERRED_PROVIDER: ${PREFERRED_PROVIDER:-}
      MAX_TOKENS: ${MAX_TOKENS:-8192}
      TEMPERATURE: ${TEMPERATURE:-1.0}
      TOP_P: ${TOP_P:-0.999}
      CORS_ORIGINS: "http://localhost:${FRONTEND_PORT:-3000},http://127.0.0.1:${FRONTEND_PORT:-3000}"
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/projects')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: ghcr.io/thiago-caffaro/tago-s-charcreator/frontend:latest
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

volumes:
  charcreator_data:
    driver: local

networks:
  internal:
    driver: bridge
